io.github.yuokada.quarkus.extension.fluency.fluentd.runtime.FluencyConfig.bufferChunkInitialSize=Buffer chunk initial size (bytes). Default is 1 MiB. Must be positive and less than {@link\n\#bufferChunkRetentionSize()}.
io.github.yuokada.quarkus.extension.fluency.fluentd.runtime.FluencyConfig.bufferChunkRetentionSize=Buffer chunk retention size (bytes). Default is 4 MiB. Must be greater than {@link\n\#bufferChunkInitialSize()}.
io.github.yuokada.quarkus.extension.fluency.fluentd.runtime.FluencyConfig.bufferChunkRetentionTimeMillis=Buffer chunk retention time (ms).
io.github.yuokada.quarkus.extension.fluency.fluentd.runtime.FluencyConfig.enabled=Whether to enable log forwarding to Fluentd.
io.github.yuokada.quarkus.extension.fluency.fluentd.runtime.FluencyConfig.host=Fluentd host. Must not be blank.
io.github.yuokada.quarkus.extension.fluency.fluentd.runtime.FluencyConfig.port=Fluentd port. Must be between 1 and 65535.
io.github.yuokada.quarkus.extension.fluency.fluentd.runtime.FluencyConfig.senderMaxRetryCount=Max retry count for sending.
