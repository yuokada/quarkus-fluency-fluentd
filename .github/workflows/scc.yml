name: scc complexity report

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**/*.java'
      - '.github/workflows/scc.yml'
      - '.github/scripts/scc_diff.py'

concurrency:
  group: scc-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      SCC_VERSION: 3.7.0
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install scc
        run: |
          set -e
          curl -fsSL "https://github.com/boyter/scc/releases/download/v${SCC_VERSION}/scc_Linux_x86_64.tar.gz" \
            | sudo tar xz -C /usr/local/bin scc
          scc --version

      - name: Render scc report to Job Summary
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python3 .github/scripts/scc_diff.py "$BASE_SHA" "$HEAD_SHA" >> "$GITHUB_STEP_SUMMARY" \
            || {
              {
                echo
                echo "_scc report unavailable: see workflow logs._"
              } >> "$GITHUB_STEP_SUMMARY"
            }
