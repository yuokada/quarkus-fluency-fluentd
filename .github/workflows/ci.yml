name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ "17", "21" ]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build and unit test
        run: ./mvnw -B install -pl .,deployment,runtime

      - name: Integration test (JVM mode)
        run: ./mvnw -B verify -f integration-tests/pom.xml -DskipITs=false

  native:
    name: Native image test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: "21"
          distribution: graalvm-community
          cache: maven
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build native (runtime + deployment)
        run: ./mvnw -B install -pl .,deployment,runtime -Pnative-image -Dsurefire.skip=true

      - name: Integration test (native mode)
        run: ./mvnw -B verify -f integration-tests/pom.xml -Pnative-image -Dsurefire.skip=true
